    <p data-en="If you manage holiday villas, you already know the story. A hidden leak runs for weeks -- underground, behind a wall, a cistern trickling silently. The water bill arrives at two or three times the normal amount, and the owner asks you why nobody spotted it." data-es="Si gestionas villas vacacionales, ya conoces la historia. Una fuga oculta funciona durante semanas -- bajo tierra, detrás de una pared, una cisterna goteando en silencio. La factura del agua llega al doble o triple de lo normal, y el propietario te pregunta por qué nadie lo detectó."></p>

    <p data-en="But it's not just about leaks. LeakGuard gives you a complete picture of water usage at every property:" data-es="Pero no se trata solo de fugas. LeakGuard te ofrece una imagen completa del consumo de agua en cada propiedad:"></p>

<script>
  function setLang(lang) {
    document.documentElement.lang = lang;

    // Update toggle buttons
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // Update all elements with data-en / data-es attributes
    document.querySelectorAll('[data-' + lang + ']').forEach(function(el) {
      el.innerHTML = el.getAttribute('data-' + lang);
    });

    // Update page title
    document.title = lang === 'es'
      ? 'Programa de Colaboración LeakGuard — Canary Detect'
      : 'LeakGuard Partner Programme — Canary Detect';

    // Update WhatsApp link
    var waBtn = document.getElementById('wa-btn');
    if (waBtn) {
      waBtn.href = lang === 'es'
        ? 'https://wa.me/34711051071?text=Hola%2C%20gestiono%20villas%20en%20Lanzarote%20y%20me%20interesa%20el%20programa%20de%20colaboraci%C3%B3n%20LeakGuard.'
        : 'https://wa.me/34711051071?text=Hi%2C%20I%20manage%20villas%20in%20Lanzarote%20and%20I%27m%20interested%20in%20the%20LeakGuard%20partner%20programme.';
    }

    // Update URL parameter without reload
    var url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState(null, '', url);

    // Scroll to top on language switch
    window.scrollTo(0, 0);
  }

  // Check URL for language parameter (?lang=es or ?lang=en)
  var params = new URLSearchParams(window.location.search);
  var urlLang = params.get('lang');
  setLang(urlLang === 'es' ? 'es' : 'en');
</script>
